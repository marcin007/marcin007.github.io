name: CI

on:
  pull_request:
    branches: [ master ]
  push:
    branches-ignore: [ master ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate and build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check localized content
        run: npm run check:content

      - name: Check Astro and TypeScript
        run: npm run check

      - name: Build
        run: npm run build

      - name: Check built output
        run: npm run check:build
